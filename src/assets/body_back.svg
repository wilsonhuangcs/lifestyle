<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 295">
  <defs>
    <radialGradient id="bodyGradB" cx="50%" cy="40%" r="55%" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#2a2742"/>
      <stop offset="65%"  stop-color="#1e1b30"/>
      <stop offset="100%" stop-color="#131126"/>
    </radialGradient>
    <radialGradient id="limbB" cx="50%" cy="40%" r="60%" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#252238"/>
      <stop offset="100%" stop-color="#131126"/>
    </radialGradient>
  </defs>

  <!-- ── Head (back) ── -->
  <circle cx="50" cy="13" r="12" fill="url(#bodyGradB)" stroke="rgba(255,255,255,0.16)" stroke-width="0.7"/>
  <!-- Occipital ridge hint -->
  <path d="M 40 17 Q 50 24 60 17" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>

  <!-- ── Neck ── -->
  <path d="M 44 25 L 56 25 L 57 43 C 54 44 46 44 43 43 Z"
        fill="url(#bodyGradB)" stroke="none"/>
  <!-- Cervical spine line -->
  <line x1="50" y1="26" x2="50" y2="42" stroke="rgba(255,255,255,0.10)" stroke-width="0.5"/>

  <!-- ── Left Rear Deltoid ── -->
  <path d="M 15 43 C 8 46 2 55 1 66 C 0 76 3 86 9 89 C 14 91 20 88 22 83 C 23 74 22 62 20 52 C 18 46 16 43 15 43 Z"
        fill="url(#limbB)" stroke="rgba(255,255,255,0.15)" stroke-width="0.7"/>

  <!-- ── Right Rear Deltoid ── -->
  <path d="M 85 43 C 92 46 98 55 99 66 C 100 76 97 86 91 89 C 86 91 80 88 78 83 C 77 74 78 62 80 52 C 82 46 84 43 85 43 Z"
        fill="url(#limbB)" stroke="rgba(255,255,255,0.15)" stroke-width="0.7"/>

  <!-- ── Main Torso (back) — same waist taper as front ── -->
  <path d="M 15 43
           C 14 51 13 61 14 73
           C 14 85 15 95 16 105
           C 17 115 20 121 23 129
           C 23 137 22 147 21 157
           C 20 163 20 167 22 172
           L 78 172
           C 80 167 80 163 79 157
           C 78 147 77 137 77 129
           C 80 121 83 115 84 105
           C 85 95 86 85 86 73
           C 87 61 86 51 85 43
           C 75 40 63 39 50 39
           C 37 39 25 40 15 43 Z"
        fill="url(#bodyGradB)" stroke="rgba(255,255,255,0.10)" stroke-width="0.5"/>

  <!-- Spine line -->
  <line x1="50" y1="43" x2="50" y2="170" stroke="rgba(255,255,255,0.12)" stroke-width="0.6"/>

  <!-- Trapezius shape -->
  <path d="M 28 44 Q 50 57 72 44 L 74 82 Q 50 88 26 82 Z"
        fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)" stroke-width="0.4"/>

  <!-- Rhomboid / mid-back diamond -->
  <path d="M 35 90 Q 50 96 65 90 L 63 118 Q 50 122 37 118 Z"
        fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="0.4"/>

  <!-- Erector spinae (spine flanks) -->
  <path d="M 44 92 Q 42 122 42 166" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <path d="M 56 92 Q 58 122 58 166" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>

  <!-- Lat flare outlines -->
  <path d="M 15 70 Q 12 94 16 122 Q 19 132 25 136" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="0.5"/>
  <path d="M 85 70 Q 88 94 84 122 Q 81 132 75 136" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="0.5"/>

  <!-- Posterior shoulder (rear delt) separation -->
  <path d="M 21 57 Q 17 68 16 80" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.4"/>
  <path d="M 79 57 Q 83 68 84 80" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.4"/>

  <!-- ── Left Upper Arm (tricep view, wider) ── -->
  <path d="M 9 50 C 4 55 1 63 1 73
           L 1 122
           C 1 130 4 136 10 137
           L 21 135
           L 22 80
           C 22 68 19 56 14 48 C 12 47 10 48 9 50 Z"
        fill="url(#limbB)" stroke="rgba(255,255,255,0.13)" stroke-width="0.5"/>
  <!-- Tricep long head line -->
  <path d="M 11 58 Q 10 94 11 132" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="0.5"/>

  <!-- ── Right Upper Arm (tricep view) ── -->
  <path d="M 91 50 C 96 55 99 63 99 73
           L 99 122
           C 99 130 96 136 90 137
           L 79 135
           L 78 80
           C 78 68 81 56 86 48 C 88 47 90 48 91 50 Z"
        fill="url(#limbB)" stroke="rgba(255,255,255,0.13)" stroke-width="0.5"/>
  <path d="M 89 58 Q 90 94 89 132" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="0.5"/>

  <!-- ── Left Forearm (back) ── -->
  <path d="M 1 125 L 3 166 C 5 172 9 175 13 175
           L 21 173 L 22 137 L 10 137 Z"
        fill="url(#limbB)" stroke="rgba(255,255,255,0.09)" stroke-width="0.5"/>

  <!-- ── Right Forearm (back) ── -->
  <path d="M 99 125 L 97 166 C 95 172 91 175 87 175
           L 79 173 L 78 137 L 90 137 Z"
        fill="url(#limbB)" stroke="rgba(255,255,255,0.09)" stroke-width="0.5"/>

  <!-- ── Glutes (rounder, more prominent) ── -->
  <path d="M 19 170 C 16 178 14 186 16 196
           C 18 206 26 214 38 213
           C 46 212 50 207 50 200
           C 50 207 54 212 62 213
           C 74 214 82 206 84 196
           C 86 186 84 178 81 170 Z"
        fill="url(#bodyGradB)" stroke="rgba(255,255,255,0.14)" stroke-width="0.6"/>
  <!-- Glute crease (separation) -->
  <line x1="50" y1="171" x2="50" y2="212" stroke="rgba(255,255,255,0.11)" stroke-width="0.6"/>
  <!-- Gluteal fold (lower crease) -->
  <path d="M 18 211 Q 34 216 50 213 Q 66 216 82 211" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="0.4"/>

  <!-- ── Left Hamstring ── -->
  <path d="M 20 214 C 17 224 14 240 15 254
           C 16 264 22 270 30 270
           C 38 270 44 264 44 254
           C 45 240 44 224 41 214 Z"
        fill="url(#limbB)" stroke="rgba(255,255,255,0.13)" stroke-width="0.5"/>
  <!-- Bicep femoris (outer hamstring) line -->
  <path d="M 40 216 Q 42 240 41 264" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="0.4"/>

  <!-- ── Right Hamstring ── -->
  <path d="M 80 214 C 83 224 86 240 85 254
           C 84 264 78 270 70 270
           C 62 270 56 264 56 254
           C 55 240 56 224 59 214 Z"
        fill="url(#limbB)" stroke="rgba(255,255,255,0.13)" stroke-width="0.5"/>
  <path d="M 60 216 Q 58 240 59 264" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="0.4"/>

  <!-- ── Left Knee (back) ── -->
  <ellipse cx="30" cy="271" rx="13" ry="6"
           fill="url(#limbB)" stroke="rgba(255,255,255,0.14)" stroke-width="0.6"/>

  <!-- ── Right Knee (back) ── -->
  <ellipse cx="70" cy="271" rx="13" ry="6"
           fill="url(#limbB)" stroke="rgba(255,255,255,0.14)" stroke-width="0.6"/>

  <!-- ── Left Calf (gastrocnemius) ── -->
  <path d="M 17 274 C 14 283 13 293 15 300
           C 17 306 23 308 30 308
           C 37 308 43 306 45 300
           C 47 293 46 283 44 274 Z"
        fill="url(#limbB)" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>
  <!-- Medial/lateral gastrocnemius split -->
  <path d="M 30 274 Q 28 290 29 305" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="0.5"/>

  <!-- ── Right Calf ── -->
  <path d="M 83 274 C 86 283 87 293 85 300
           C 83 306 77 308 70 308
           C 63 308 57 306 55 300
           C 53 293 54 283 56 274 Z"
        fill="url(#limbB)" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>
  <path d="M 70 274 Q 72 290 71 305" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="0.5"/>
</svg>
