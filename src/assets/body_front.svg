<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 295">
  <defs>
    <!-- Subtle center-highlight to give very slight roundness without looking 3D -->
    <radialGradient id="bodyGrad" cx="50%" cy="40%" r="55%" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#2a2742"/>
      <stop offset="65%"  stop-color="#1e1b30"/>
      <stop offset="100%" stop-color="#131126"/>
    </radialGradient>
    <radialGradient id="limb" cx="50%" cy="40%" r="60%" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#252238"/>
      <stop offset="100%" stop-color="#131126"/>
    </radialGradient>
  </defs>

  <!-- ── Head ── -->
  <circle cx="50" cy="13" r="12" fill="url(#bodyGrad)" stroke="rgba(255,255,255,0.18)" stroke-width="0.7"/>
  <!-- Jaw/chin hint -->
  <path d="M 42 19 Q 50 26 58 19" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="0.5"/>

  <!-- ── Neck ── -->
  <path d="M 44 25 L 56 25 L 57 43 C 54 44 46 44 43 43 Z"
        fill="url(#bodyGrad)" stroke="none"/>
  <!-- Neck side lines -->
  <line x1="44" y1="26" x2="44" y2="42" stroke="rgba(255,255,255,0.08)" stroke-width="0.4"/>
  <line x1="56" y1="26" x2="56" y2="42" stroke="rgba(255,255,255,0.08)" stroke-width="0.4"/>

  <!-- ── Left Deltoid (shoulder cap) ── -->
  <path d="M 15 43 C 8 46 2 55 1 66 C 0 76 3 86 9 89 C 14 91 20 88 22 83 C 23 74 22 62 20 52 C 18 46 16 43 15 43 Z"
        fill="url(#limb)" stroke="rgba(255,255,255,0.15)" stroke-width="0.7"/>

  <!-- ── Right Deltoid (shoulder cap) ── -->
  <path d="M 85 43 C 92 46 98 55 99 66 C 100 76 97 86 91 89 C 86 91 80 88 78 83 C 77 74 78 62 80 52 C 82 46 84 43 85 43 Z"
        fill="url(#limb)" stroke="rgba(255,255,255,0.15)" stroke-width="0.7"/>

  <!-- ── Main Torso — proper waist taper ── -->
  <!-- Left edge goes: wide at shoulder → narrows at waist → flares at hip -->
  <path d="M 15 43
           C 14 51 13 61 14 73
           C 14 85 15 95 16 105
           C 17 115 20 121 23 129
           C 23 137 22 147 21 157
           C 20 163 20 167 22 172
           L 78 172
           C 80 167 80 163 79 157
           C 78 147 77 137 77 129
           C 80 121 83 115 84 105
           C 85 95 86 85 86 73
           C 87 61 86 51 85 43
           C 75 40 63 39 50 39
           C 37 39 25 40 15 43 Z"
        fill="url(#bodyGrad)" stroke="rgba(255,255,255,0.10)" stroke-width="0.5"/>

  <!-- Clavicle arcs -->
  <path d="M 22 44 Q 35 47 50 44 Q 65 47 78 44" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>
  <!-- Sternum / center line -->
  <line x1="50" y1="43" x2="50" y2="92" stroke="rgba(255,255,255,0.13)" stroke-width="0.6"/>
  <!-- Pec lower border (infra-mammary fold) -->
  <path d="M 19 88 Q 34 98 50 92 Q 66 98 81 88" fill="none" stroke="rgba(255,255,255,0.11)" stroke-width="0.5"/>
  <!-- Linea alba (center ab line) -->
  <line x1="50" y1="92" x2="50" y2="155" stroke="rgba(255,255,255,0.09)" stroke-width="0.5"/>
  <!-- Ab horizontal lines (6-pack) -->
  <path d="M 38 106 Q 50 110 62 106" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="0.5"/>
  <path d="M 37 120 Q 50 124 63 120" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="0.5"/>
  <path d="M 36 134 Q 50 137 64 134" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="0.4"/>
  <!-- Oblique curves -->
  <path d="M 20 102 Q 22 118 23 148" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
  <path d="M 80 102 Q 78 118 77 148" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
  <!-- Serratus (side ribs) hints -->
  <path d="M 20 108 Q 23 112 20 116" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.4"/>
  <path d="M 80 108 Q 77 112 80 116" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.4"/>

  <!-- ── Hip / Pelvis ── -->
  <path d="M 22 172 C 18 175 17 180 18 186 L 82 186 C 83 180 82 175 78 172 Z"
        fill="url(#bodyGrad)" stroke="none"/>
  <!-- Inguinal (hip crease) lines -->
  <path d="M 28 173 Q 39 180 50 176 Q 61 180 72 173" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="0.4"/>

  <!-- ── Left Upper Arm (wider, tapered) ── -->
  <path d="M 9 50 C 4 55 1 63 1 73
           L 1 122
           C 1 130 4 136 10 137
           L 21 135
           L 22 80
           C 22 68 19 56 14 48 C 12 47 10 48 9 50 Z"
        fill="url(#limb)" stroke="rgba(255,255,255,0.13)" stroke-width="0.5"/>
  <!-- Bicep peak hint -->
  <path d="M 1 92 Q 4 84 11 82 Q 18 84 22 92" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="0.5"/>

  <!-- ── Right Upper Arm (wider, tapered) ── -->
  <path d="M 91 50 C 96 55 99 63 99 73
           L 99 122
           C 99 130 96 136 90 137
           L 79 135
           L 78 80
           C 78 68 81 56 86 48 C 88 47 90 48 91 50 Z"
        fill="url(#limb)" stroke="rgba(255,255,255,0.13)" stroke-width="0.5"/>
  <!-- Bicep peak hint -->
  <path d="M 99 92 Q 96 84 89 82 Q 82 84 78 92" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="0.5"/>

  <!-- ── Left Forearm (narrower than upper arm) ── -->
  <path d="M 1 125 L 3 166 C 5 172 9 175 13 175
           L 21 173 L 22 137 L 10 137 Z"
        fill="url(#limb)" stroke="rgba(255,255,255,0.09)" stroke-width="0.5"/>

  <!-- ── Right Forearm ── -->
  <path d="M 99 125 L 97 166 C 95 172 91 175 87 175
           L 79 173 L 78 137 L 90 137 Z"
        fill="url(#limb)" stroke="rgba(255,255,255,0.09)" stroke-width="0.5"/>

  <!-- ── Left Thigh — slight outward bulge at mid-thigh ── -->
  <path d="M 20 185 C 17 196 14 212 13 228
           C 13 242 15 254 21 258
           C 26 262 34 262 40 258
           C 46 252 47 238 46 224
           C 45 208 43 194 40 185 Z"
        fill="url(#limb)" stroke="rgba(255,255,255,0.13)" stroke-width="0.5"/>
  <!-- Rectus femoris line (center quad) -->
  <path d="M 32 186 Q 30 216 31 254" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="0.5"/>
  <!-- VMO hint (inner quad sweep) -->
  <path d="M 16 232 Q 22 248 28 256" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.4"/>

  <!-- ── Right Thigh ── -->
  <path d="M 80 185 C 83 196 86 212 87 228
           C 87 242 85 254 79 258
           C 74 262 66 262 60 258
           C 54 252 53 238 54 224
           C 55 208 57 194 60 185 Z"
        fill="url(#limb)" stroke="rgba(255,255,255,0.13)" stroke-width="0.5"/>
  <!-- Quad line -->
  <path d="M 68 186 Q 70 216 69 254" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="0.5"/>

  <!-- ── Left Knee ── -->
  <ellipse cx="30" cy="260" rx="14" ry="7"
           fill="url(#limb)" stroke="rgba(255,255,255,0.15)" stroke-width="0.6"/>
  <!-- Patella hint -->
  <ellipse cx="30" cy="259" rx="6" ry="4"
           fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="0.4"/>

  <!-- ── Right Knee ── -->
  <ellipse cx="70" cy="260" rx="14" ry="7"
           fill="url(#limb)" stroke="rgba(255,255,255,0.15)" stroke-width="0.6"/>
  <ellipse cx="70" cy="259" rx="6" ry="4"
           fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="0.4"/>

  <!-- ── Left Calf ── -->
  <path d="M 17 264 C 14 273 13 283 15 291
           C 17 297 24 300 31 300
           C 38 300 44 297 46 291
           C 48 283 47 273 45 264 Z"
        fill="url(#limb)" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>
  <!-- Gastrocnemius medial line -->
  <path d="M 31 264 Q 29 280 30 296" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.4"/>

  <!-- ── Right Calf ── -->
  <path d="M 83 264 C 86 273 87 283 85 291
           C 83 297 76 300 69 300
           C 62 300 56 297 54 291
           C 52 283 53 273 55 264 Z"
        fill="url(#limb)" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>
  <path d="M 69 264 Q 71 280 70 296" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.4"/>
</svg>
